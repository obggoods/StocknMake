name: DB Backup

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Postgres 17 client
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg ca-certificates lsb-release
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          wget -qO- https://www.postgresql.org/media/keys/ACCC4CF8.asc | gpg --dearmor | sudo tee /usr/share/keyrings/postgresql.gpg > /dev/null
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Check pg_dump version
        run: /usr/lib/postgresql/17/bin/pg_dump --version

      - name: Run pg_dump
        run: /usr/lib/postgresql/17/bin/pg_dump "$DATABASE_URL" > backup.sql

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup
          path: backup.sql